<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Парк Галицкого — Краснодар</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Georgia', serif;
  overflow: hidden;
}
#title {
  color: #f0e68c;
  font-size: 14px;
  letter-spacing: 2px;
  margin-bottom: 6px;
  text-shadow: 0 0 10px #f0e68c88;
}
#canvas {
  border: 2px solid #4a7c4a;
  border-radius: 4px;
  display: block;
  box-shadow: 0 0 30px #2d5a2d88;
}
#info {
  color: #a8d5a2;
  font-size: 11px;
  margin-top: 6px;
  text-align: center;
  min-height: 16px;
}
#dpad {
  display: grid;
  grid-template-columns: repeat(3, 52px);
  grid-template-rows: repeat(2, 52px);
  gap: 5px;
  margin-top: 10px;
}
.dbtn {
  background: rgba(74,124,74,0.7);
  border: 2px solid #4a7c4a;
  border-radius: 10px;
  color: #fff;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}
.dbtn:active { background: rgba(74,124,74,1); }
#dbtn-up    { grid-column: 2; grid-row: 1; }
#dbtn-left  { grid-column: 1; grid-row: 2; }
#dbtn-down  { grid-column: 2; grid-row: 2; }
#dbtn-right { grid-column: 3; grid-row: 2; }
</style>
</head>
<body>
<div id="title">🌿 ПАРК ГАЛИЦКОГО · КРАСНОДАР 🌿</div>
<canvas id="canvas"></canvas>
<div id="info">Добро пожаловать в парк!</div>
<div id="dpad">
  <button class="dbtn" id="dbtn-up">▲</button>
  <button class="dbtn" id="dbtn-left">◀</button>
  <button class="dbtn" id="dbtn-down">▼</button>
  <button class="dbtn" id="dbtn-right">▶</button>
</div>

<script>
const W = Math.min(window.innerWidth - 8, 420);
const H = Math.min(window.innerHeight - 180, 420);
const canvas = document.getElementById('canvas');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

// Map size
const MAP_W = 1200, MAP_H = 1200;

// Camera
let camX = 0, camY = 0;

// Player
const player = { x: 600, y: 900, size: 12, speed: 3, dir: 0 };

// Keys
const keys = {};

// Map objects
const paths = [
  // Main central path (horizontal)
  { x: 100, y: 570, w: 1000, h: 30, color: '#c8b89a' },
  // Main central path (vertical)
  { x: 570, y: 100, w: 30, h: 1000, color: '#c8b89a' },
  // Diagonal paths
  { x: 200, y: 200, w: 800, h: 20, color: '#c8b89a', angle: 45 },
  // Ring path around central area
  { x: 380, y: 380, w: 440, h: 440, color: '#c8b89a', type: 'ring' },
  // Entrance path bottom
  { x: 570, y: 1000, w: 30, h: 200, color: '#c8b89a' },
  // Entrance path top
  { x: 570, y: 0, w: 30, h: 200, color: '#c8b89a' },
  // Side paths
  { x: 0, y: 570, w: 200, h: 30, color: '#c8b89a' },
  { x: 1000, y: 570, w: 200, h: 30, color: '#c8b89a' },
  // Inner paths
  { x: 380, y: 380, w: 440, h: 30, color: '#c8b89a' },
  { x: 380, y: 790, w: 440, h: 30, color: '#c8b89a' },
  { x: 380, y: 380, w: 30, h: 440, color: '#c8b89a' },
  { x: 790, y: 380, w: 30, h: 440, color: '#c8b89a' },
];

const grass = [
  { x: 0, y: 0, w: MAP_W, h: MAP_H, color: '#3a8c3a' },
];

const water = [
  // Main pond center
  { x: 430, y: 430, w: 340, h: 200, color: '#2a6ea8', type: 'pond', name: 'Главный пруд' },
  // Small pond NW
  { x: 150, y: 150, w: 160, h: 120, color: '#2a6ea8', type: 'pond', name: 'Малый пруд' },
  // Small pond NE
  { x: 900, y: 150, w: 160, h: 120, color: '#2a6ea8', type: 'pond', name: 'Восточный пруд' },
];

const landmarks = [
  // Fountains
  { x: 585, y: 585, r: 40, color: '#5bb8f5', type: 'fountain', name: '⛲ Главный фонтан' },
  { x: 230, y: 580, r: 20, color: '#5bb8f5', type: 'fountain', name: '⛲ Фонтан' },
  { x: 980, y: 580, r: 20, color: '#5bb8f5', type: 'fountain', name: '⛲ Фонтан' },

  // Sculptures / art objects
  { x: 420, y: 250, r: 15, color: '#d4af37', type: 'sculpture', name: '🗿 Скульптура' },
  { x: 790, y: 250, r: 15, color: '#d4af37', type: 'sculpture', name: '🗿 Скульптура' },
  { x: 250, y: 790, r: 15, color: '#d4af37', type: 'sculpture', name: '🗿 Скульптура' },
  { x: 960, y: 790, r: 15, color: '#d4af37', type: 'sculpture', name: '🗿 Скульптура' },

  // Cafes / pavilions
  { x: 200, y: 400, w: 60, h: 50, color: '#8B4513', type: 'cafe', name: '☕ Кафе' },
  { x: 950, y: 400, w: 60, h: 50, color: '#8B4513', type: 'cafe', name: '☕ Кафе' },
  { x: 200, y: 750, w: 60, h: 50, color: '#8B4513', type: 'cafe', name: '☕ Кафе' },
  { x: 950, y: 750, w: 60, h: 50, color: '#8B4513', type: 'cafe', name: '☕ Кафе' },

  // Amphitheatre
  { x: 480, y: 820, w: 240, h: 100, color: '#b8860b', type: 'stage', name: '🎭 Амфитеатр' },

  // Children playground
  { x: 100, y: 700, w: 120, h: 100, color: '#ff6b6b', type: 'playground', name: '🎠 Детская площадка' },

  // Sport area
  { x: 950, y: 650, w: 120, h: 100, color: '#ff8c00', type: 'sport', name: '⚽ Спортивная зона' },

  // Entrance gates
  { x: 565, y: 1130, w: 70, h: 30, color: '#888', type: 'gate', name: '🚪 Главный вход' },
  { x: 565, y: 40, w: 70, h: 30, color: '#888', type: 'gate', name: '🚪 Северный вход' },
  { x: 40, y: 555, w: 30, h: 70, color: '#888', type: 'gate', name: '🚪 Западный вход' },
  { x: 1130, y: 555, w: 30, h: 70, color: '#888', type: 'gate', name: '🚪 Восточный вход' },

  // Rose garden
  { x: 820, y: 820, w: 130, h: 130, color: '#ff69b4', type: 'garden', name: '🌹 Розарий' },
];

// Trees (scattered)
const trees = [];
const treePositions = [
  [130,130],[200,130],[260,130],[130,200],[130,260],
  [1070,130],[1000,130],[940,130],[1070,200],[1070,260],
  [130,1070],[200,1070],[260,1070],[130,1000],[130,940],
  [1070,1070],[1000,1070],[940,1070],[1070,1000],[1070,940],
  [340,200],[400,160],[460,200],[340,1000],[400,1040],[460,1000],
  [740,200],[800,160],[860,200],[740,1000],[800,1040],[860,1000],
  [160,340],[160,400],[160,460],[160,740],[160,800],[160,860],
  [1040,340],[1040,400],[1040,460],[1040,740],[1040,800],[1040,860],
  [310,310],[310,880],[880,310],[880,880],
  [350,500],[350,600],[350,700],
  [850,500],[850,600],[850,700],
  [500,350],[600,350],[700,350],
  [500,850],[600,850],[700,850],
  [450,670],[480,710],[520,680],[550,720],
  [700,670],[720,710],[740,680],[760,720],
];
treePositions.forEach(([x,y]) => trees.push({x, y, r: 14}));

// Solid objects for collision
const solidObjects = [
  ...water,
  // buildings
  { x: 200, y: 400, w: 60, h: 50 },
  { x: 950, y: 400, w: 60, h: 50 },
  { x: 200, y: 750, w: 60, h: 50 },
  { x: 950, y: 750, w: 60, h: 50 },
  { x: 480, y: 820, w: 240, h: 100 },
];

function worldToScreen(wx, wy) {
  return [wx - camX, wy - camY];
}

function updateCamera() {
  camX = player.x - W / 2;
  camY = player.y - H / 2;
  camX = Math.max(0, Math.min(MAP_W - W, camX));
  camY = Math.max(0, Math.min(MAP_H - H, camY));
}

function drawEllipse(x, y, rx, ry, color) {
  ctx.beginPath();
  ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function isColliding(nx, ny) {
  const pr = player.size / 2;
  for (const o of solidObjects) {
    if (o.type === 'pond') {
      // ellipse-ish check
      const cx = o.x + o.w/2, cy = o.y + o.h/2;
      const dx = (nx - cx) / (o.w/2 + pr);
      const dy = (ny - cy) / (o.h/2 + pr);
      if (dx*dx + dy*dy < 1) return true;
    } else if (o.w && o.h) {
      if (nx - pr < o.x + o.w && nx + pr > o.x &&
          ny - pr < o.y + o.h && ny + pr > o.y) return true;
    }
  }
  // Map boundaries
  if (nx - pr < 0 || nx + pr > MAP_W || ny - pr < 0 || ny + pr > MAP_H) return true;
  return false;
}

function getNearbyName() {
  const pr = 60;
  for (const lm of landmarks) {
    if (lm.r) {
      const dx = player.x - lm.x, dy = player.y - lm.y;
      if (Math.sqrt(dx*dx+dy*dy) < lm.r + pr) return lm.name;
    } else if (lm.w) {
      const cx = lm.x + lm.w/2, cy = lm.y + lm.h/2;
      const dx = player.x - cx, dy = player.y - cy;
      if (Math.abs(dx) < lm.w/2 + pr && Math.abs(dy) < lm.h/2 + pr) return lm.name;
    }
  }
  for (const w of water) {
    const cx = w.x + w.w/2, cy = w.y + w.h/2;
    const dx = player.x - cx, dy = player.y - cy;
    if (Math.abs(dx) < w.w/2 + pr && Math.abs(dy) < w.h/2 + pr) return w.name;
  }
  return '';
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Grass bg
  ctx.fillStyle = '#3d9140';
  ctx.fillRect(0, 0, W, H);

  // Lighter grass patches
  ctx.fillStyle = '#45a348';
  for (let gx = 0; gx < MAP_W; gx += 80) {
    for (let gy = 0; gy < MAP_H; gy += 80) {
      const [sx, sy] = worldToScreen(gx, gy);
      if (sx > -80 && sx < W+80 && sy > -80 && sy < H+80) {
        ctx.fillRect(sx + 10, sy + 10, 30, 30);
      }
    }
  }

  // Paths
  ctx.fillStyle = '#c8b89a';
  // Main cross
  let [px, py] = worldToScreen(100, 558);
  ctx.fillRect(px, py, 1000, 28);
  [px, py] = worldToScreen(558, 100);
  ctx.fillRect(px, py, 28, 1000);
  // Inner ring
  [px, py] = worldToScreen(380, 380);
  ctx.fillRect(px, py, 440, 22);
  [px, py] = worldToScreen(380, 798);
  ctx.fillRect(px, py, 440, 22);
  [px, py] = worldToScreen(380, 380);
  ctx.fillRect(px, py, 22, 440);
  [px, py] = worldToScreen(798, 380);
  ctx.fillRect(px, py, 22, 440);

  // Water ponds
  for (const w of water) {
    const [sx, sy] = worldToScreen(w.x + w.w/2, w.y + w.h/2);
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(sx, sy, w.w/2, w.h/2, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#1a5fa0';
    ctx.fill();
    ctx.strokeStyle = '#4a9fd4';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Water shimmer
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    ctx.ellipse(sx - w.w/6, sy - w.h/6, w.w/5, w.h/8, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Landmarks
  for (const lm of landmarks) {
    if (lm.type === 'fountain') {
      const [sx, sy] = worldToScreen(lm.x, lm.y);
      // Base
      ctx.beginPath();
      ctx.arc(sx, sy, lm.r, 0, Math.PI*2);
      ctx.fillStyle = '#1a7abf';
      ctx.fill();
      ctx.strokeStyle = '#5bb8f5';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Water spray
      ctx.fillStyle = 'rgba(91,184,245,0.7)';
      ctx.beginPath();
      ctx.arc(sx, sy, lm.r * 0.5, 0, Math.PI*2);
      ctx.fill();
      // Sparkle
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(sx - 3, sy - 3, 3, 0, Math.PI*2);
      ctx.fill();
    } else if (lm.type === 'sculpture') {
      const [sx, sy] = worldToScreen(lm.x, lm.y);
      ctx.beginPath();
      ctx.arc(sx, sy, lm.r, 0, Math.PI*2);
      ctx.fillStyle = '#b8a060';
      ctx.fill();
      ctx.strokeStyle = '#d4af37';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Top
      ctx.fillStyle = '#d4af37';
      ctx.beginPath();
      ctx.arc(sx, sy - lm.r/2, lm.r * 0.4, 0, Math.PI*2);
      ctx.fill();
    } else if (lm.type === 'cafe' || lm.type === 'stage' || lm.type === 'gate' || lm.type === 'playground' || lm.type === 'sport' || lm.type === 'garden') {
      const [sx, sy] = worldToScreen(lm.x, lm.y);
      ctx.fillStyle = lm.color;
      ctx.fillRect(sx, sy, lm.w, lm.h);
      ctx.strokeStyle = 'rgba(0,0,0,0.4)';
      ctx.lineWidth = 1;
      ctx.strokeRect(sx, sy, lm.w, lm.h);

      if (lm.type === 'garden') {
        // Roses dots
        const colors = ['#ff69b4','#ff1493','#dc143c','#ff6347'];
        for (let i = 0; i < 12; i++) {
          ctx.fillStyle = colors[i % colors.length];
          ctx.beginPath();
          ctx.arc(sx + 10 + (i % 4) * 28, sy + 10 + Math.floor(i/4) * 35, 8, 0, Math.PI*2);
          ctx.fill();
        }
      }
    }
  }

  // Trees
  for (const t of trees) {
    const [sx, sy] = worldToScreen(t.x, t.y);
    if (sx < -20 || sx > W+20 || sy < -20 || sy > H+20) continue;
    // Shadow
    ctx.beginPath();
    ctx.ellipse(sx + 3, sy + 4, t.r * 0.8, t.r * 0.5, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fill();
    // Trunk
    ctx.fillStyle = '#5c3d1e';
    ctx.fillRect(sx - 3, sy, 6, 8);
    // Crown
    ctx.beginPath();
    ctx.arc(sx, sy, t.r, 0, Math.PI*2);
    ctx.fillStyle = '#2d7a2d';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sx - 3, sy - 3, t.r * 0.7, 0, Math.PI*2);
    ctx.fillStyle = '#3a9a3a';
    ctx.fill();
    // Highlight
    ctx.beginPath();
    ctx.arc(sx - 4, sy - 4, t.r * 0.3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(100,200,100,0.4)';
    ctx.fill();
  }

  // Player shadow
  const [spx, spy] = worldToScreen(player.x, player.y);
  ctx.beginPath();
  ctx.ellipse(spx + 2, spy + player.size/2 + 2, player.size/2, player.size/4, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();

  // Player body (little person)
  // Legs
  ctx.fillStyle = '#4169e1';
  ctx.fillRect(spx - 5, spy + 2, 4, 8);
  ctx.fillRect(spx + 1, spy + 2, 4, 8);
  // Body
  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(spx - 6, spy - 6, 12, 10);
  // Head
  ctx.beginPath();
  ctx.arc(spx, spy - 10, 6, 0, Math.PI*2);
  ctx.fillStyle = '#f4c07a';
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(spx - 2, spy - 11, 1, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(spx + 2, spy - 11, 1, 0, Math.PI*2);
  ctx.fill();

  // Minimap
  drawMinimap();
}

function drawMinimap() {
  const mw = 80, mh = 80;
  const mx = W - mw - 6, my = 6;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(mx, my, mw, mh);
  ctx.strokeStyle = '#4a7c4a';
  ctx.lineWidth = 1;
  ctx.strokeRect(mx, my, mw, mh);

  // Water on minimap
  for (const w of water) {
    ctx.fillStyle = '#2a6ea8';
    ctx.fillRect(mx + w.x/MAP_W*mw, my + w.y/MAP_H*mh, w.w/MAP_W*mw, w.h/MAP_H*mh);
  }

  // Player on minimap
  const mmx = mx + player.x/MAP_W*mw;
  const mmy = my + player.y/MAP_H*mh;
  ctx.beginPath();
  ctx.arc(mmx, mmy, 3, 0, Math.PI*2);
  ctx.fillStyle = '#ff4444';
  ctx.fill();
}

function update() {
  let dx = 0, dy = 0;
  if (keys['ArrowUp'] || keys['w'])    dy = -1;
  if (keys['ArrowDown'] || keys['s'])  dy =  1;
  if (keys['ArrowLeft'] || keys['a'])  dx = -1;
  if (keys['ArrowRight'] || keys['d']) dx =  1;

  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

  const nx = player.x + dx * player.speed;
  const ny = player.y + dy * player.speed;

  if (!isColliding(nx, player.y)) player.x = nx;
  if (!isColliding(player.x, ny)) player.y = ny;

  updateCamera();

  const nearby = getNearbyName();
  document.getElementById('info').textContent = nearby || 'Гуляете по парку...';
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Keyboard
document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key] = false; });

// D-pad buttons
function holdDir(dx, dy) {
  let interval;
  const start = () => { keys[`__dpad_${dx}_${dy}`] = true; };
  const stop = () => { keys[`__dpad_${dx}_${dy}`] = false; };
  return { start, stop };
}

const dpad = {
  up:    { key: 'ArrowUp' },
  down:  { key: 'ArrowDown' },
  left:  { key: 'ArrowLeft' },
  right: { key: 'ArrowRight' },
};

Object.entries(dpad).forEach(([dir, { key }]) => {
  const btn = document.getElementById(`dbtn-${dir}`);
  const press = (e) => { e.preventDefault(); keys[key] = true; };
  const release = (e) => { e.preventDefault(); keys[key] = false; };
  btn.addEventListener('touchstart', press, { passive: false });
  btn.addEventListener('touchend', release, { passive: false });
  btn.addEventListener('mousedown', press);
  btn.addEventListener('mouseup', release);
  btn.addEventListener('mouseleave', release);
});

updateCamera();
loop();
</script>
</body>
</html>
