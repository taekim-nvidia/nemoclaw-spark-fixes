<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake ⚡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;overflow:hidden;touch-action:none;font-family:'Courier New',monospace;}
#wrap{position:relative;}
#cv{display:block;}
/* HUD */
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:rgba(0,0,0,.6);pointer-events:none;}
#score-box{text-align:left;}
#score{color:#00ff88;font-size:22px;font-weight:bold;text-shadow:0 0 10px #00ff88;}
#hi-label{color:#555;font-size:10px;}
#hi{color:#888;font-size:14px;}
#title-hud{color:#00ffcc;font-size:13px;letter-spacing:3px;opacity:.6;}
#level-box{text-align:right;}
#level{color:#ff8800;font-size:13px;}
#speed{color:#555;font-size:11px;}
/* D-pad */
#dpad{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:grid;grid-template-columns:repeat(3,50px);grid-template-rows:repeat(2,50px);gap:5px;opacity:.7;}
.db{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);border-radius:8px;color:#00ff88;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none;}
.db:active{background:rgba(0,255,136,.3);}
#du{grid-column:2;grid-row:1;}
#dl{grid-column:1;grid-row:2;}
#dr{grid-column:3;grid-row:2;}
#dd{grid-column:2;grid-row:2;}
</style>
</head>
<body>
<div id="wrap">
<canvas id="cv"></canvas>
<div id="hud">
  <div id="score-box">
    <div id="score">0</div>
    <div id="hi-label">РЕКОРД</div>
    <div id="hi">0</div>
  </div>
  <div id="title-hud">SNAKE</div>
  <div id="level-box">
    <div id="level">LVL 1</div>
    <div id="speed">NORMAL</div>
  </div>
</div>
<div id="dpad">
  <div class="db" id="du">▲</div>
  <div class="db" id="dl">◀</div>
  <div class="db" id="dd">▼</div>
  <div class="db" id="dr">▶</div>
</div>
</div>

<script>
const W=Math.min(window.innerWidth,420);
const H=window.innerHeight;
document.getElementById('wrap').style.cssText=`width:${W}px;height:${H}px;`;
const cv=document.getElementById('cv');
cv.width=W;cv.height=H;
const c=cv.getContext('2d');

// Audio
let actx=null;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();}
function playSound(type){
  if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.connect(g);g.connect(actx.destination);
  if(type==='eat'){o.type='sine';o.frequency.value=440+score*3;g.gain.setValueAtTime(.3,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.15);o.start();o.stop(actx.currentTime+.15);}
  else if(type==='die'){o.type='sawtooth';o.frequency.value=200;g.gain.setValueAtTime(.4,actx.currentTime);o.frequency.exponentialRampToValueAtTime(50,actx.currentTime+.5);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.5);o.start();o.stop(actx.currentTime+.5);}
  else if(type==='level'){o.type='triangle';o.frequency.value=880;g.gain.setValueAtTime(.3,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.3);o.start();o.stop(actx.currentTime+.3);}
}

// Game constants
const CELL=18;
const COLS=Math.floor(W/CELL);
const ROWS=Math.floor((H-120)/CELL);
const OX=Math.floor((W-COLS*CELL)/2);
const OY=50;

// State
let snake,dir,nextDir,food,score,hiScore,gameState,frame,interval,particles,flashTimer,level,bonusFood;
hiScore=parseInt(localStorage.getItem('snake_hi')||'0');
document.getElementById('hi').textContent=hiScore;

function randCell(){return{x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
function spawnFood(){
  let f;
  do{f=randCell();}while(snake.some(s=>s.x===f.x&&s.y===f.y));
  f.hue=Math.floor(Math.random()*360);
  f.pulse=0;
  return f;
}
function spawnBonus(){
  if(Math.random()>.7){
    let f;
    do{f=randCell();}while(snake.some(s=>s.x===f.x&&s.y===f.y));
    f.hue=60;f.timer=200;f.bonus=true;
    return f;
  }
  return null;
}

function startGame(){
  snake=[{x:Math.floor(COLS/2),y:Math.floor(ROWS/2)}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  food=spawnFood();bonusFood=null;
  score=0;level=1;frame=0;
  particles=[];flashTimer=0;
  gameState='play';
  document.getElementById('score').textContent='0';
  document.getElementById('level').textContent='LVL 1';
  document.getElementById('speed').textContent='NORMAL';
  if(interval)clearInterval(interval);
  interval=setInterval(tick,160);
}

function tick(){
  if(gameState!=='play')return;
  frame++;
  dir={...nextDir};
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};

  // Wall wrap
  head.x=(head.x+COLS)%COLS;
  head.y=(head.y+ROWS)%ROWS;

  // Self collision
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){
    gameState='dead';
    if(score>hiScore){hiScore=score;localStorage.setItem('snake_hi',hiScore);document.getElementById('hi').textContent=hiScore;}
    playSound('die');
    // Explode snake
    snake.forEach(s=>spawnParticles(OX+s.x*CELL+CELL/2,OY+s.y*CELL+CELL/2,8,'#ff4444'));
    clearInterval(interval);
    return;
  }

  snake.unshift(head);

  // Eat food
  if(head.x===food.x&&head.y===food.y){
    score+=10+(level-1)*5;
    document.getElementById('score').textContent=score;
    spawnParticles(OX+food.x*CELL+CELL/2,OY+food.y*CELL+CELL/2,12,`hsl(${food.hue},100%,60%)`);
    flashTimer=8;
    playSound('eat');
    food=spawnFood();
    if(score>0&&score%(50+level*20)===0)levelUp();
    if(!bonusFood)bonusFood=spawnBonus();
  }else{
    snake.pop();
  }

  // Eat bonus
  if(bonusFood&&head.x===bonusFood.x&&head.y===bonusFood.y){
    score+=50;
    document.getElementById('score').textContent=score;
    spawnParticles(OX+bonusFood.x*CELL+CELL/2,OY+bonusFood.y*CELL+CELL/2,20,'#ffff00');
    bonusFood=null;
    playSound('level');
  }
  if(bonusFood){bonusFood.timer--;if(bonusFood.timer<=0)bonusFood=null;}
}

function levelUp(){
  level++;
  document.getElementById('level').textContent='LVL '+level;
  const speeds=['NORMAL','FAST','TURBO','INSANE','MAX'];
  document.getElementById('speed').textContent=speeds[Math.min(level-1,4)];
  clearInterval(interval);
  const ms=Math.max(60,160-(level-1)*20);
  interval=setInterval(tick,ms);
  spawnParticles(W/2,H/2,30,'#ff8800');
  playSound('level');
}

function spawnParticles(x,y,n,col){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const spd=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:40+Math.floor(Math.random()*20),maxLife:60,col,r:2+Math.random()*3});
  }
}

// Drawing
function drawGrid(){
  c.strokeStyle='rgba(0,255,136,.04)';
  c.lineWidth=.5;
  for(let x=0;x<=COLS;x++){c.beginPath();c.moveTo(OX+x*CELL,OY);c.lineTo(OX+x*CELL,OY+ROWS*CELL);c.stroke();}
  for(let y=0;y<=ROWS;y++){c.beginPath();c.moveTo(OX,OY+y*CELL);c.lineTo(OX+COLS*CELL,OY+y*CELL);c.stroke();}
}

function drawSnake(){
  const len=snake.length;
  snake.forEach((s,i)=>{
    const sx=OX+s.x*CELL,sy=OY+s.y*CELL;
    const t=1-i/len;
    const hue=120+i*2;
    // Glow
    if(i<5){
      c.shadowColor=`hsl(${hue},100%,60%)`;
      c.shadowBlur=flashTimer>0?20:10;
    }
    // Body gradient per segment
    const bright=40+t*30;
    c.fillStyle=`hsl(${hue},100%,${bright}%)`;
    const margin=i===0?1:2;
    const rr=i===0?CELL/2-1:CELL/2-2;
    c.beginPath();
    c.roundRect(sx+margin,sy+margin,CELL-margin*2,CELL-margin*2,rr);
    c.fill();

    // Head details
    if(i===0){
      c.shadowBlur=0;
      // Eyes
      const ex1=sx+CELL/2+(dir.y*3)+(-dir.x*4);
      const ey1=sy+CELL/2+(dir.x*3)+(-dir.y*4);
      const ex2=sx+CELL/2+(dir.y*3)+(dir.x*4);
      const ey2=sy+CELL/2+(dir.x*3)+(dir.y*4);
      c.fillStyle='#fff';
      c.beginPath();c.arc(ex1,ey1,2.5,0,Math.PI*2);c.fill();
      c.beginPath();c.arc(ex2,ey2,2.5,0,Math.PI*2);c.fill();
      c.fillStyle='#111';
      c.beginPath();c.arc(ex1+dir.x,ey1+dir.y,1.2,0,Math.PI*2);c.fill();
      c.beginPath();c.arc(ex2+dir.x,ey2+dir.y,1.2,0,Math.PI*2);c.fill();
    }
    c.shadowBlur=0;
  });
}

function drawFood(f,isBonus){
  const fx=OX+f.x*CELL+CELL/2,fy=OY+f.y*CELL+CELL/2;
  f.pulse=(f.pulse||0)+.1;
  const pulseSz=1+Math.sin(f.pulse)*.15;
  const col=isBonus?'#ffff00':`hsl(${f.hue},100%,60%)`;

  c.shadowColor=col;c.shadowBlur=15;
  c.fillStyle=col;
  c.beginPath();c.arc(fx,fy,CELL*.38*pulseSz,0,Math.PI*2);c.fill();

  // Inner shine
  c.shadowBlur=0;
  c.fillStyle='rgba(255,255,255,.4)';
  c.beginPath();c.arc(fx-2,fy-2,CELL*.15,0,Math.PI*2);c.fill();

  // Bonus star
  if(isBonus){
    c.fillStyle='#fff';c.font='bold 10px sans-serif';c.textAlign='center';
    c.fillText('★',fx,fy+4);
    // Timer ring
    const pct=f.timer/200;
    c.strokeStyle='rgba(255,255,0,.5)';c.lineWidth=2;
    c.beginPath();c.arc(fx,fy,CELL*.5,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);c.stroke();
  }
  c.shadowBlur=0;c.textAlign='left';
}

function drawParticles(){
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.life--;
    const a=p.life/p.maxLife;
    c.globalAlpha=a;
    c.fillStyle=p.col;
    c.beginPath();c.arc(p.x,p.y,p.r*a,0,Math.PI*2);c.fill();
  });
  c.globalAlpha=1;
  particles=particles.filter(p=>p.life>0);
}

function drawBorder(){
  const grd=c.createLinearGradient(OX,OY,OX+COLS*CELL,OY+ROWS*CELL);
  const hue=flashTimer>0?0:120;
  grd.addColorStop(0,`hsla(${hue},100%,50%,.6)`);
  grd.addColorStop(1,`hsla(${hue+60},100%,50%,.6)`);
  c.strokeStyle=grd;
  c.lineWidth=flashTimer>0?3:1.5;
  c.shadowColor=`hsl(${hue},100%,60%)`;
  c.shadowBlur=flashTimer>0?20:8;
  c.strokeRect(OX-.5,OY-.5,COLS*CELL+1,ROWS*CELL+1);
  c.shadowBlur=0;
  if(flashTimer>0)flashTimer--;
}

function drawGameOver(){
  c.fillStyle='rgba(0,0,0,.75)';c.fillRect(0,0,W,H);
  c.shadowColor='#ff4444';c.shadowBlur=30;
  c.fillStyle='#ff4444';c.font='bold 36px Courier New';c.textAlign='center';
  c.fillText('GAME OVER',W/2,H*.38);
  c.shadowBlur=0;
  c.fillStyle='#fff';c.font='20px Courier New';
  c.fillText('Очки: '+score,W/2,H*.46);
  if(score>=hiScore&&score>0){c.fillStyle='#ffd700';c.font='bold 15px Courier New';c.fillText('🏆 НОВЫЙ РЕКОРД!',W/2,H*.52);}
  c.fillStyle='rgba(0,255,136,.6)';c.font='13px Courier New';
  const pulse=Math.sin(Date.now()*.003)*.3+.7;
  c.globalAlpha=pulse;
  c.fillText('Нажми чтобы играть снова',W/2,H*.6);
  c.globalAlpha=1;c.textAlign='left';
}

function drawStart(){
  // Animated BG
  c.fillStyle='rgba(0,0,0,.04)';c.fillRect(0,0,W,H);
  drawGrid();
  // Title
  c.shadowColor='#00ff88';c.shadowBlur=30;
  c.fillStyle='#00ff88';c.font='bold 48px Courier New';c.textAlign='center';
  c.fillText('SNAKE',W/2,H*.3);
  c.shadowBlur=0;
  c.fillStyle='rgba(0,255,136,.5)';c.font='12px Courier New';
  c.fillText('by Sonnet 4.6 ⚡',W/2,H*.38);
  c.fillStyle='#555';c.font='11px Courier New';
  c.fillText('Свайп или кнопки для управления',W/2,H*.48);
  const pulse=Math.sin(Date.now()*.004)*.3+.7;
  c.globalAlpha=pulse;
  c.fillStyle='#00ff88';c.font='bold 14px Courier New';
  c.fillText('▶ НАЖМИ ЧТОБЫ НАЧАТЬ',W/2,H*.56);
  c.globalAlpha=1;
  // Hi score
  if(hiScore>0){c.fillStyle='#888';c.font='12px Courier New';c.fillText('Рекорд: '+hiScore,W/2,H*.64);}
  c.textAlign='left';
}

function loop(){
  c.fillStyle='rgba(0,0,8,.85)';c.fillRect(0,0,W,H);

  if(gameState==='start'){
    drawStart();
  }else{
    drawGrid();
    drawBorder();
    if(food)drawFood(food,false);
    if(bonusFood)drawFood(bonusFood,true);
    drawParticles();
    if(snake&&snake.length)drawSnake();
    if(gameState==='dead')drawGameOver();
  }

  requestAnimationFrame(loop);
}

// Controls
const keyMap={'ArrowUp':{x:0,y:-1},'ArrowDown':{x:0,y:1},'ArrowLeft':{x:-1,y:0},'ArrowRight':{x:1,y:0},'w':{x:0,y:-1},'s':{x:0,y:1},'a':{x:-1,y:0},'d':{x:1,y:0}};
document.addEventListener('keydown',e=>{
  initAudio();
  if(gameState==='start'||gameState==='dead'){startGame();return;}
  const d=keyMap[e.key];
  if(d&&!(d.x===-dir.x&&d.y===-dir.y))nextDir=d;
});

// Dpad
[['du',{x:0,y:-1}],['dd',{x:0,y:1}],['dl',{x:-1,y:0}],['dr',{x:1,y:0}]].forEach(([id,d])=>{
  const el=document.getElementById(id);
  const fn=e=>{
    e.preventDefault();initAudio();
    if(gameState==='start'||gameState==='dead'){startGame();return;}
    if(!(d.x===-dir.x&&d.y===-dir.y))nextDir=d;
  };
  el.addEventListener('touchstart',fn,{passive:false});
  el.addEventListener('mousedown',fn);
});

// Swipe
let tx=0,ty=0;
cv.addEventListener('touchstart',e=>{initAudio();tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
cv.addEventListener('touchend',e=>{
  if(gameState==='start'||gameState==='dead'){startGame();return;}
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.hypot(dx,dy)<15)return;
  let d;
  if(Math.abs(dx)>Math.abs(dy))d=dx>0?{x:1,y:0}:{x:-1,y:0};
  else d=dy>0?{x:0,y:1}:{x:0,y:-1};
  if(!(d.x===-dir.x&&d.y===-dir.y))nextDir=d;
},{passive:true});
cv.addEventListener('click',()=>{initAudio();if(gameState==='start'||gameState==='dead')startGame();});

// Init
gameState='start';
particles=[];
loop();
</script>
</body>
</html>
