<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nokia Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #222;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: monospace;
  }
  #screen {
    background: #8ba26a;
    border: 4px solid #444;
    border-radius: 4px;
    display: block;
    image-rendering: pixelated;
  }
  #score {
    color: #8ba26a;
    font-size: 18px;
    margin: 8px 0 12px;
    letter-spacing: 2px;
  }
  #controls {
    display: grid;
    grid-template-columns: repeat(3, 60px);
    grid-template-rows: repeat(2, 60px);
    gap: 6px;
    margin-top: 10px;
  }
  .btn {
    background: #444;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    active: background #666;
  }
  .btn:active { background: #666; }
  #btn-up    { grid-column: 2; grid-row: 1; }
  #btn-left  { grid-column: 1; grid-row: 2; }
  #btn-down  { grid-column: 2; grid-row: 2; }
  #btn-right { grid-column: 3; grid-row: 2; }
</style>
</head>
<body>
<div id="score">SCORE: 0</div>
<canvas id="screen"></canvas>
<div id="controls">
  <button class="btn" id="btn-up">▲</button>
  <button class="btn" id="btn-left">◀</button>
  <button class="btn" id="btn-down">▼</button>
  <button class="btn" id="btn-right">▶</button>
</div>

<script>
const COLS = 21, ROWS = 17, CELL = Math.min(Math.floor((window.innerWidth - 16) / COLS), 22);
const W = COLS * CELL, H = ROWS * CELL;
const canvas = document.getElementById('screen');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

const BG = '#8ba26a', GRID = '#7d9460', DARK = '#28321e';
let snake, dir, nextDir, food, score, gameOver, interval;

function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function spawnFood() {
  let pos;
  do { pos = { x: rnd(0, COLS-1), y: rnd(0, ROWS-1) }; }
  while (snake.some(s => s.x === pos.x && s.y === pos.y));
  return pos;
}

function start() {
  snake = [{ x: Math.floor(COLS/2), y: Math.floor(ROWS/2) }];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  food = spawnFood();
  score = 0;
  gameOver = false;
  document.getElementById('score').textContent = 'SCORE: 0';
  if (interval) clearInterval(interval);
  interval = setInterval(tick, 150);
}

function tick() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    clearInterval(interval);
    gameOver = true;
    draw();
    return;
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById('score').textContent = 'SCORE: ' + score;
    food = spawnFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // grid dots
  ctx.fillStyle = GRID;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      ctx.fillRect(c * CELL + Math.floor(CELL/2), r * CELL + Math.floor(CELL/2), 1, 1);

  // food
  ctx.fillStyle = DARK;
  ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);
  ctx.fillStyle = BG;
  ctx.fillRect(food.x * CELL + 2 + Math.floor((CELL-4)/2) - 1, food.y * CELL + 3, 2, CELL - 6);
  ctx.fillRect(food.x * CELL + 3, food.y * CELL + 2 + Math.floor((CELL-4)/2) - 1, CELL - 6, 2);

  // snake
  ctx.fillStyle = DARK;
  snake.forEach((s, i) => {
    ctx.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
    if (i === 0) {
      ctx.fillStyle = BG;
      ctx.fillRect(s.x * CELL + 2, s.y * CELL + 2, 2, 2);
      ctx.fillRect(s.x * CELL + CELL - 4, s.y * CELL + 2, 2, 2);
      ctx.fillStyle = DARK;
    }
  });

  if (gameOver) {
    ctx.fillStyle = BG;
    ctx.fillRect(0, Math.floor(H/2) - 14, W, 28);
    ctx.fillStyle = DARK;
    ctx.font = `bold ${Math.max(11, CELL - 1)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W/2, Math.floor(H/2) - 1);
    ctx.font = `${Math.max(9, CELL - 3)}px monospace`;
    ctx.fillText('нажми любую кнопку', W/2, Math.floor(H/2) + 12);
  }
}

// keyboard
document.addEventListener('keydown', e => {
  if (gameOver) { start(); return; }
  if (e.key === 'ArrowUp'    && dir.y !== 1)  nextDir = { x: 0, y: -1 };
  if (e.key === 'ArrowDown'  && dir.y !== -1) nextDir = { x: 0, y:  1 };
  if (e.key === 'ArrowLeft'  && dir.x !== 1)  nextDir = { x: -1, y: 0 };
  if (e.key === 'ArrowRight' && dir.x !== -1) nextDir = { x:  1, y: 0 };
});

// buttons
function setDir(dx, dy) {
  if (gameOver) { start(); return; }
  if (dx === 0 && dy === -1 && dir.y !== 1)  nextDir = { x: 0, y: -1 };
  if (dx === 0 && dy ===  1 && dir.y !== -1) nextDir = { x: 0, y:  1 };
  if (dx === -1 && dy === 0 && dir.x !== 1)  nextDir = { x: -1, y: 0 };
  if (dx ===  1 && dy === 0 && dir.x !== -1) nextDir = { x:  1, y: 0 };
}
document.getElementById('btn-up').addEventListener('touchstart',    e => { e.preventDefault(); setDir(0,-1); });
document.getElementById('btn-down').addEventListener('touchstart',  e => { e.preventDefault(); setDir(0,1); });
document.getElementById('btn-left').addEventListener('touchstart',  e => { e.preventDefault(); setDir(-1,0); });
document.getElementById('btn-right').addEventListener('touchstart', e => { e.preventDefault(); setDir(1,0); });
document.getElementById('btn-up').addEventListener('click',    () => setDir(0,-1));
document.getElementById('btn-down').addEventListener('click',  () => setDir(0,1));
document.getElementById('btn-left').addEventListener('click',  () => setDir(-1,0));
document.getElementById('btn-right').addEventListener('click', () => setDir(1,0));

start();
</script>
</body>
</html>
